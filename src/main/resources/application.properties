# ========================================
# Campus Drive - Application Properties
# ========================================

# Server
server.port=${PORT:8080}

# MySQL Database (supports TiDB Serverless)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusdrive_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:aayush@5}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:campusDriveSecretKey2024SuperSecureTokenForJWTAuthenticationPlatform}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Admin seed credentials
app.admin.email=${ADMIN_EMAIL:admin@campus.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=${ADMIN_NAME:Super Admin}

# Logging
logging.level.com.campusdrive=INFO
logging.level.org.springframework.security=WARN
